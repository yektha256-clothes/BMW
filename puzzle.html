<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise</title>
    <style>
        :root { --neon: #ff2e63; --dark: #0f172a; }
        body {
            background: var(--dark); margin: 0; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; min-height: 100vh; 
            font-family: sans-serif; overflow: hidden; touch-action: none;
        }
        h2 { color: white; font-size: 1.1rem; margin-bottom: 15px; text-shadow: 0 0 10px var(--neon); text-align: center; }
        
        #main-board {
            width: 300px; height: 300px; background: #1e293b; position: relative;
            border: 2px solid rgba(255,255,255,0.1);
        }
        
        #piece-tray {
            width: 95%; min-height: 140px; margin-top: 25px; padding: 10px;
            background: rgba(255, 255, 255, 0.05); border-radius: 15px;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; 
            align-items: center; position: relative; box-sizing: border-box;
        }

        #tray-message {
            position: absolute; width: 90%; text-align: center;
            color: rgba(255, 255, 255, 0.4); font-size: 0.8rem;
            line-height: 1.4; pointer-events: none; z-index: 1; font-style: italic;
        }

        .puzzle-piece {
            width: 100px; height: 100px; background-image: url('our-photo.jpg');
            background-size: 300px 300px; border: none; cursor: grab; 
            touch-action: none; position: relative; z-index: 10;
        }

        .dragging {
            position: fixed !important; z-index: 1000 !important;
            box-shadow: 0 0 20px var(--neon); pointer-events: none;
            border: 1px solid #fff !important;
        }

        .solved { position: absolute !important; z-index: 1 !important; }

        #next-btn {
            display: none; margin-top: 25px; padding: 15px 45px;
            background: var(--neon); color: #fff; border: none; border-radius: 50px;
            font-weight: bold; box-shadow: 0 5px 20px rgba(255,46,99,0.5); cursor: pointer;
        }
    </style>
</head>
<body>

    <h2>annekond pattum potta ❤️</h2>
    <div id="main-board"></div>
    <div id="piece-tray">
        <div id="tray-message">
            You're not just the person I love... <br>
            you're the reason I believe in love <br>
            i w pottadyyy
        </div>
    </div>
    <button id="next-btn" onclick="location.href='page2.html'">ibde onn thott nokk! ➡️</button>

    <script>
        const board = document.getElementById('main-board');
        const tray = document.getElementById('piece-tray');
        const nextBtn = document.getElementById('next-btn');
        let solvedCount = 0;

        for (let i = 0; i < 9; i++) {
            const r = Math.floor(i / 3), c = i % 3;
            const piece = document.createElement('div');
            piece.className = 'puzzle-piece';
            piece.style.backgroundPosition = `-${c * 100}px -${r * 100}px`;
            piece.dataset.x = c * 100;
            piece.dataset.y = r * 100;
            
            piece.addEventListener('touchstart', startDrag, {passive: false});
            piece.addEventListener('mousedown', startDrag);
            tray.appendChild(piece);
        }

        (function shuffle() {
            let pieces = Array.from(tray.querySelectorAll('.puzzle-piece'));
            pieces.sort(() => Math.random() - 0.5);
            pieces.forEach(p => tray.appendChild(p));
        })();

        function startDrag(e) {
            e.preventDefault();
            const el = e.target;
            if (el.classList.contains('solved')) return;

            const touch = e.touches ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            const offsetX = touch.clientX - rect.left;
            const offsetY = touch.clientY - rect.top;

            el.classList.add('dragging');

            const move = (me) => {
                const mt = me.touches ? me.touches[0] : me;
                el.style.left = (mt.clientX - offsetX) + 'px';
                el.style.top = (mt.clientY - offsetY) + 'px';
            };

            const stop = (se) => {
                window.removeEventListener('mousemove', move);
                window.removeEventListener('touchmove', move);
                window.removeEventListener('mouseup', stop);
                window.removeEventListener('touchend', stop);

                el.classList.remove('dragging');

                // ഫോണിൽ സ്ക്രീനിൽ നിന്ന് വിരൽ എടുക്കുമ്പോൾ കിട്ടുന്ന കോർഡിനേറ്റ്സ് കൃത്യമായി എടുക്കുന്നു
                const finalTouch = se.changedTouches ? se.changedTouches[0] : se;
                const bRect = board.getBoundingClientRect();
                
                const dropX = finalTouch.clientX - bRect.left - offsetX;
                const dropY = finalTouch.clientY - bRect.top - offsetY;

                const targetX = parseInt(el.dataset.x);
                const targetY = parseInt(el.dataset.y);

                // ടോളറൻസ് 50px
                if (Math.abs(dropX - targetX) < 50 && Math.abs(dropY - targetY) < 50) {
                    el.className = 'puzzle-piece solved';
                    el.style.cssText = `position:absolute; left:${targetX}px; top:${targetY}px; background-position:-${targetX}px -${targetY}px; background-image:url('our-photo.jpg'); background-size:300px 300px;`;
                    board.appendChild(el);
                    solvedCount++;
                    if (solvedCount === 9) {
                        nextBtn.style.display = 'block';
                        board.style.border = "none";
                        document.getElementById('tray-message').style.color = "var(--neon)";
                    }
                } else {
                    // തെറ്റായ ഇടത്താണെങ്കിൽ പൂർണ്ണമായും റീസെറ്റ് ചെയ്യുന്നു
                    el.style.position = 'relative';
                    el.style.left = '0';
                    el.style.top = '0';
                    el.style.zIndex = '10';
                    tray.appendChild(el);
                }
            };

            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, {passive: false});
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchend', stop);
        }
    </script>
</body>
</html>
