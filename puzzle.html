<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Birthday Surprise - Seamless Puzzle</title>
    <style>
        :root { --neon: #ff2e63; --dark: #0f172a; }
        
        body {
            background: var(--dark);
            margin: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            min-height: 100vh; font-family: sans-serif; overflow: hidden; touch-action: none;
        }

        h2 { color: white; font-size: 1.1rem; margin-bottom: 15px; text-shadow: 0 0 10px var(--neon); }

        #main-board {
            width: 300px; height: 300px; background: #1e293b; position: relative;
            border: 2px solid rgba(255,255,255,0.1);
            overflow: hidden; /* പീസുകൾ പുറത്തേക്ക് പോകില്ല */
        }

        #piece-tray {
            width: 95%; min-height: 120px; margin-top: 25px; padding: 10px;
            background: rgba(255,255,255,0.05); border-radius: 15px;
            display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; align-items: center;
        }

        .puzzle-piece {
            width: 100px; height: 100px;
            background-image: url('our-photo.jpg');
            background-size: 300px 300px;
            border: none; /* വരകൾ ഒഴിവാക്കാൻ ബോർഡർ കളഞ്ഞു */
            outline: none;
            box-sizing: border-box;
            cursor: grab; touch-action: none; position: relative; z-index: 10;
        }

        .dragging {
            position: fixed !important;
            z-index: 1000 !important;
            box-shadow: 0 0 20px var(--neon);
            pointer-events: none;
            border: 1px solid #fff !important;
        }

        .solved {
            position: absolute !important;
            border: none !important; /* ബോർഡറിൽ വെക്കുമ്പോൾ വരകൾ ഉണ്ടാകില്ല */
            z-index: 1 !important;
            margin: 0 !important;
            outline: none !important;
        }

        #next-btn {
            display: none; margin-top: 25px; padding: 15px 45px;
            background: var(--neon); color: #fff; border: none; border-radius: 50px;
            font-weight: bold; box-shadow: 0 5px 20px rgba(255,46,99,0.5);
        }
    </style>
</head>
<body>

    <h2>anne kond pattum kunjappu ❤️</h2>
    <div id="main-board"></div>
    <div id="piece-tray"></div>
    <button id="next-btn" onclick="location.href='page2.html'">ibde onn thott nokk! ➡️</button>

    <script>
        const board = document.getElementById('main-board');
        const tray = document.getElementById('piece-tray');
        const nextBtn = document.getElementById('next-btn');
        let solvedCount = 0;

        for (let i = 0; i < 9; i++) {
            const r = Math.floor(i / 3);
            const c = i % 3;
            const piece = document.createElement('div');
            piece.className = 'puzzle-piece';
            
            // ബാക്ക്ഗ്രൗണ്ട് കൃത്യമായി സെറ്റ് ചെയ്യുന്നു
            piece.style.backgroundPosition = `-${c * 100}px -${r * 100}px`;
            piece.dataset.x = c * 100;
            piece.dataset.y = r * 100;
            
            piece.addEventListener('touchstart', startDrag, {passive: false});
            piece.addEventListener('mousedown', startDrag);
            tray.appendChild(piece);
        }

        // ഷഫിൾ ഫങ്ക്ഷൻ
        (function shuffle() {
            let pieces = Array.from(tray.children);
            pieces.sort(() => Math.random() - 0.5);
            pieces.forEach(p => tray.appendChild(p));
        })();

        function startDrag(e) {
            e.preventDefault();
            const el = e.target;
            if (el.classList.contains('solved')) return;

            const touch = e.touches ? e.touches[0] : e;
            const rect = el.getBoundingClientRect();
            const offsetX = touch.clientX - rect.left;
            const offsetY = touch.clientY - rect.top;

            el.classList.add('dragging');

            const move = (e) => {
                const t = e.touches ? e.touches[0] : e;
                el.style.left = (t.clientX - offsetX) + 'px';
                el.style.top = (t.clientY - offsetY) + 'px';
            };

            const stop = (e) => {
                window.removeEventListener('mousemove', move);
                window.removeEventListener('touchmove', move);
                el.classList.remove('dragging');

                const t = e.changedTouches ? e.changedTouches[0] : e;
                const bRect = board.getBoundingClientRect();
                
                const dropX = t.clientX - bRect.left - offsetX;
                const dropY = t.clientY - bRect.top - offsetY;

                const targetX = parseInt(el.dataset.x);
                const targetY = parseInt(el.dataset.y);

                if (Math.abs(dropX - targetX) < 45 && Math.abs(dropY - targetY) < 45) {
                    el.className = 'puzzle-piece solved';
                    el.style.left = targetX + 'px';
                    el.style.top = targetY + 'px';
                    board.appendChild(el);
                    solvedCount++;
                    if (solvedCount === 9) {
                        nextBtn.style.display = 'block';
                        // എല്ലാം പൂർത്തിയാകുമ്പോൾ ബോർഡർ ബോക്സ് സ്റ്റൈൽ മാറ്റുക
                        board.style.border = "none";
                    }
                } else {
                    el.style.position = 'relative'; el.style.left = '0'; el.style.top = '0';
                    tray.appendChild(el);
                }
                window.removeEventListener('mouseup', stop);
                window.removeEventListener('touchend', stop);
            };

            window.addEventListener('mousemove', move);
            window.addEventListener('touchmove', move, {passive: false});
            window.addEventListener('mouseup', stop);
            window.addEventListener('touchend', stop);
        }
    </script>
</body>
</html>
